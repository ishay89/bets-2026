# Supabase CLI project configuration.
# Docs: https://supabase.com/docs/guides/cli/config
#
# REQUIRED: Set project_id to the reference shown in Supabase Dashboard →
# Settings → General (e.g. "abcdefghijklmnopqrst"). Without it, remote
# commands (supabase db push, supabase db pull) will fail.

[project]
project_id = ""  # TODO: fill in your Supabase project reference

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
