<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="World Cup 2026 trophy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="gold" x1="20" y1="6" x2="44" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="0.45" stop-color="#f4c430"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="shine" x1="26" y1="10" x2="30" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Trophy: globe held aloft on twisting figures over a base -->
  <g fill="url(#gold)" stroke="#8a6508" stroke-width="0.75" stroke-linejoin="round">
    <!-- Globe -->
    <circle cx="32" cy="20" r="11"/>
    <!-- Twisting body / supporting figures -->
    <path d="M32 30c-4 4-7 8-7 13 0 3 2 5 4 6l6 0c2-1 4-3 4-6 0-5-3-9-7-13z"/>
    <!-- Stepped base -->
    <rect x="22" y="49" width="20" height="4" rx="1.5"/>
    <rect x="19" y="53" width="26" height="5" rx="2"/>
  </g>

  <!-- Globe detailing -->
  <g stroke="#8a6508" stroke-width="0.9" fill="none" opacity="0.7">
    <ellipse cx="32" cy="20" rx="4.5" ry="11"/>
    <line x1="21" y1="20" x2="43" y2="20"/>
    <path d="M23 14c6 3 12 3 18 0M23 26c6-3 12-3 18 0"/>
  </g>

  <!-- Highlight -->
  <path d="M27 12c-3 2-5 5-5 9" stroke="url(#shine)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
</svg>
